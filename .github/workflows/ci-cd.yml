name: CI/CD DevOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Security Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --severity-threshold=high

  deploy:
    needs: build-test-security
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Deploy Environment via Docker Compose
        run: |
          echo "Desplegando versión con hash de trazabilidad: ${{ github.sha }}"
          docker-compose up -d --build
          
      - name: Verify Live Deployment Trazability
        run: |
          docker ps
          echo "Microservicio Node.js desplegado exitosamente."