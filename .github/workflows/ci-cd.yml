name: CI/CD DevOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Corregido: Llamamos a pytest mediante el módulo de python para evitar el error 127
      - name: Run Unit Tests
        run: |
          python -m pytest tests/ --doctest-modules --junitxml=junit/test-results.xml

      # Corregido: Instalamos el CLI oficial de Snyk directamente para asegurar que el comando exista
      - name: Install Snyk CLI
        run: npm install -g snyk

      # Ejecución del escaneo con bloqueo estricto por seguridad (IE3)
      - name: Run Snyk Security Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --severity-threshold=high

  deploy:
    needs: build-test-security
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Deploy Environment via Docker Compose
        run: |
          echo "Desplegando versión de producción con hash: ${{ github.sha }}"
          docker-compose up -d --build
          
       Wilk-name: Verify Live Deployment Trazability
        run: |
          docker ps
          echo "Microservicio desplegado exitosamente."